name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Forces pnpm to link all internal binaries across packages properly
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Task 1: Runs your pipeline checks consistently using Turbo
      - name: Build and validate workspace change
        run: |
         pnpm turbo run build --filter=@quickex/backend
         pnpm turbo run lint --filter=@quickex/backend --continue

